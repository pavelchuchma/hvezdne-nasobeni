<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀🥥 Násobilkové hry</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Comic Sans MS", "Segoe UI", Verdana, sans-serif;
    background: var(--bg);
    color: #fff;
    overflow: hidden;
  }

  body.theme-space {
    --bg: linear-gradient(180deg, #0b1026 0%, #1b1f4a 45%, #3b2f6b 100%);
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --panelBorder: rgba(255,255,255,.25);
    --groundGrad: linear-gradient(180deg, #4b3a2a, #6b4f37);
    --groundBorder: #8b6f47;
  }
  body.theme-coconut {
    --bg: linear-gradient(180deg, #0f3a42 0%, #164a38 50%, #2a3d1c 100%);
    --accent: #34d399;
    --accent2: #4ade80;
    --panelBorder: rgba(255,255,255,.3);
    --groundGrad: linear-gradient(180deg, #b8934f, #8a6a34);
    --groundBorder: #6b4f25;
  }

  /* hvězdičky v pozadí (jen vesmírné téma) */
  .starbg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, #fff, transparent),
      radial-gradient(2px 2px at 70% 20%, #fff, transparent),
      radial-gradient(1px 1px at 40% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 85% 60%, #fff, transparent),
      radial-gradient(1px 1px at 10% 80%, #fff, transparent),
      radial-gradient(2px 2px at 55% 50%, #fff, transparent),
      radial-gradient(1px 1px at 90% 90%, #fff, transparent);
    opacity: .6;
  }
  body.theme-coconut .starbg { display: none; }

  .wrap {
    position: relative; z-index: 1;
    display: flex;
    height: 100vh;
  }

  /* ---- levá část: hra ---- */
  .game {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 18px;
  }
  h1 {
    font-size: 1.8em;
    margin: 0;
    text-align: center;
    text-shadow: 2px 2px 0 var(--accent);
  }
  #countWrap {
    width: 320px; max-width: 80vw;
    height: 16px;
    background: rgba(255,255,255,.15);
    border-radius: 10px;
    overflow: hidden;
  }
  #countBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg,#34d399,#fbbf24,#ef4444);
    transition: width .25s linear;
  }
  #example {
    font-size: 4em;
    font-weight: bold;
    text-shadow: 0 3px 12px rgba(0,0,0,.4);
    min-height: 1.2em;
    text-align: center;
  }
  #answer {
    font-size: 2.4em;
    font-family: inherit;
    text-align: center;
    width: 220px;
    max-width: 70vw;
    padding: 8px 12px;
    border-radius: 16px;
    border: 4px solid var(--accent2);
    outline: none;
    background: #fff;
    color: #1e293b;
  }
  #answer:focus { border-color: #34d399; box-shadow: 0 0 0 5px rgba(52,211,153,.3); }
  #answer.shake { animation: shake .35s; border-color:#ef4444; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)}
    40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
  }
  .stats { display:flex; gap:26px; font-size:1.2em; }
  .stats b { color:#fbbf24; }
  #gameSelect, #diff { text-align:center; }
  #gameSelect .lbl, #diff .lbl { font-size:1em; opacity:.85; margin-bottom:8px; }
  .diffBtns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .diffBtn {
    font-family: inherit; font-size: .95em; font-weight: bold;
    padding: 8px 12px; border-radius: 12px; cursor: pointer;
    color:#fff; border: 3px solid transparent;
    background: rgba(255,255,255,.12);
    transition: all .15s;
  }
  .diffBtn:hover { background: rgba(255,255,255,.22); }
  .diffBtn.sel { border-color:#fbbf24; background: rgba(251,191,36,.25); transform: scale(1.05); }
  .diffBtn.locked { opacity:.4; cursor: not-allowed; }
  #startBtn {
    font-family: inherit; font-size: 1.4em; font-weight: bold;
    padding: 14px 36px; border: none; border-radius: 16px; cursor: pointer;
    color:#fff; background: linear-gradient(#34d399,#059669);
    box-shadow: 0 6px 0 rgba(0,0,0,.3);
  }
  #startBtn:active { transform: translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.3); }
  #msg { font-size:1.4em; text-align:center; min-height:1.4em; font-weight:bold; }

  /* ---- pravá část: dráha s vozidlem ---- */
  .launchpad {
    position: relative;
    width: 200px;
    border-left: 3px dashed var(--panelBorder);
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(255,255,255,.05) 100%);
  }
  #launchpadInner { position: absolute; inset: 0; }
  #topIcon {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-size: 70px;
    filter: drop-shadow(0 0 14px rgba(255,200,120,.7));
    z-index: 2;
  }
  .ground {
    position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: var(--groundGrad);
    border-top: 4px solid var(--groundBorder);
    z-index: 2;
  }
  .ramp {
    position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    font-size: 30px;
    z-index: 2;
  }
  body.theme-coconut .ramp {
    font-size: 54px;
    filter: drop-shadow(0 0 10px rgba(255,30,30,.75)) saturate(1.5) brightness(1.05);
    animation: prowl 1.2s ease-in-out infinite;
  }
  @keyframes prowl {
    0%,100% { transform: translateX(-50%) scale(1) rotate(-3deg); }
    50%     { transform: translateX(-50%) scale(1.1) rotate(3deg); }
  }
  #angerMark {
    display: none;
    position: absolute; bottom: 100px; left: 68%;
    font-size: 22px; z-index: 3;
    animation: angerPulse .9s ease-in-out infinite;
  }
  body.theme-coconut #angerMark { display: block; }
  @keyframes angerPulse {
    0%,100% { transform: scale(1) rotate(0deg); opacity: .85; }
    50%     { transform: scale(1.35) rotate(12deg); opacity: 1; }
  }

  /* vysoký kmen palmy od země až nahoru (jen kokosové téma) */
  #trunk {
    display: none;
    position: absolute;
    top: 74px; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 26px;
    clip-path: polygon(38% 0%, 62% 0%, 84% 100%, 16% 100%);
    background: repeating-linear-gradient(180deg, #9a6a35 0px, #9a6a35 10px, #7a4f26 10px, #7a4f26 20px);
    box-shadow: inset -4px 0 6px rgba(0,0,0,.35), inset 4px 0 6px rgba(255,255,255,.15);
    z-index: 0;
  }
  body.theme-coconut #trunk { display: block; }
  #coconutCluster {
    display: none;
    position: absolute;
    top: 68px; left: 50%; transform: translateX(-50%);
    font-size: 22px; letter-spacing: 6px;
    z-index: 1;
  }
  body.theme-coconut #coconutCluster { display: block; }
  /* trasa vozidla: 0% dole nad rampou, 100% u cíle */
  #rocketZone {
    position: absolute;
    left: 0; right: 0;
    bottom: 70px;   /* 0% pozice */
    top: 90px;      /* 100% pozice */
    z-index: 2;
  }
  #rocket {
    position: absolute;
    left: 50%;
    bottom: 0%;
    transform: translateX(-50%) rotate(-45deg);
    font-size: 52px;
    transition: bottom .15s linear;
  }
  body.theme-coconut #rocket { transform: translateX(-50%) rotate(0deg); }
  /* ukazatel procent */
  #pct {
    position:absolute; top:50%; right:8px; transform:translateY(-50%) rotate(0deg);
    font-size:1.1em; color:#fbbf24; font-weight:bold;
    text-shadow:0 1px 3px #000;
  }

  #flyingCoconut {
    position: absolute;
    left: 50%;
    top: 90px;
    transform: translateX(-50%);
    font-size: 34px;
    z-index: 20;
    transition: top .6s cubic-bezier(.6,-0.1,.9,.4);
  }
  #flyingCoconut.fly { top: calc(100% - 120px); }

  .confetti {
    position: fixed; top:-20px; font-size:24px; pointer-events:none;
    animation: fall linear forwards; z-index:50;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity:.9; } }

  /* ---- mobilní režim: dotyková klávesnice, žádný focus, menší dráha ---- */
  #mobileToggle {
    position: fixed; top: 8px; left: 8px; z-index: 100;
    font-family: inherit; font-size: 1.1em;
    padding: 6px 10px; border-radius: 10px; border: none; cursor: pointer;
    color: #fff; background: rgba(255,255,255,.15);
  }
  #mobileToggle:hover { background: rgba(255,255,255,.28); }
  #mobileToggle.on { background: rgba(52,211,153,.4); }
  body.playing #mobileToggle { display: none; }

  #keypad {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 240px; max-width: 78vw;
  }
  .key {
    font-family: inherit; font-size: 1.5em; font-weight: bold;
    padding: 12px 0; border-radius: 14px; border: none; cursor: pointer;
    color: #fff; background: rgba(255,255,255,.15);
  }
  .key:active { background: rgba(255,255,255,.32); transform: scale(.95); }
  .key-ok   { background: linear-gradient(#34d399,#059669); }
  .key-back { background: rgba(239,68,68,.4); }

  /* dotyková klávesnice se ukáže jen během hraní; výběr hry/obtížnosti jen před hraním */
  body.mobile-ui.playing #keypad { display: grid; }
  body.mobile-ui.playing #gameSelect,
  body.mobile-ui.playing #diff { display: none; }

  body.mobile-ui { overflow-y: auto; height: auto; min-height: 100%; }
  body.mobile-ui .wrap { height: auto; min-height: 100vh; }
  body.mobile-ui .game { padding: 8px; gap: 6px; justify-content: flex-start; }
  body.mobile-ui h1 { font-size: 1em; }
  body.mobile-ui #example { font-size: 2.1em; min-height: 0; }
  body.mobile-ui #answer { font-size: 1.5em; width: 140px; padding: 4px 8px; caret-color: transparent; }
  body.mobile-ui .stats { font-size: 1em; gap: 14px; }
  body.mobile-ui #msg { font-size: 1.1em; min-height: 0; }
  body.mobile-ui .key { padding: 8px 0; font-size: 1.25em; }
  body.mobile-ui #keypad { gap: 6px; width: 200px; }

  /* zúžená dráha vpravo — zmenšíme velikost jednotlivých prvků (ne transform),
     ať se nedeformují a rozsah pohybu (0-100 %) zůstane po celé výšce obrazovky */
  body.mobile-ui .launchpad { width: 56px; }
  body.mobile-ui #topIcon { font-size: 32px; }
  body.mobile-ui #rocket { font-size: 24px; }
  body.mobile-ui .ramp { font-size: 15px; }
  body.mobile-ui.theme-coconut .ramp { font-size: 24px; }
  body.mobile-ui #pct { font-size: .7em; right: 3px; }
  body.mobile-ui #trunk { width: 12px; top: 46px; }
  body.mobile-ui #coconutCluster { font-size: 11px; letter-spacing: 2px; top: 38px; }
  body.mobile-ui #angerMark { font-size: 13px; bottom: 72px; }
  body.mobile-ui #flyingCoconut { font-size: 18px; }
</style>
</head>
<body class="theme-space">
<button id="mobileToggle">📱</button>
<div class="starbg"></div>
<div class="wrap">
  <div class="game">
    <h1 id="gameTitle">🚀 Doleť raketou k planetě! 🪐</h1>
    <div id="example">Připraven?</div>
    <input id="answer" type="number" inputmode="numeric" autocomplete="off" disabled>
    <div id="keypad">
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key key-back" data-key="back">⌫</button>
      <button class="key" data-key="0">0</button>
      <button class="key key-ok" data-key="ok">✓</button>
    </div>
    <div class="stats">
      <span>⏱️ Čas: <b id="time">0,0 s</b></span>
      <span>📈 Výška: <b id="height">0</b>%</span>
    </div>
    <div id="msg"></div>
    <div id="gameSelect">
      <div class="lbl">Hra:</div>
      <div class="diffBtns" id="gameBtns"></div>
    </div>
    <div id="diff">
      <div class="lbl">Obtížnost:</div>
      <div class="diffBtns" id="diffBtns"></div>
    </div>
    <button id="startBtn">▶️ START</button>
  </div>

  <div class="launchpad" id="launchpad">
    <div id="launchpadInner">
      <div id="topIcon">🪐</div>
      <div id="trunk"></div>
      <div id="coconutCluster">🥥🥥</div>
      <div id="pct">0%</div>
      <div id="rocketZone">
        <div id="rocket">🚀</div>
      </div>
      <div class="ramp" id="rampIcon">🗼</div>
      <div id="angerMark">💢</div>
      <div class="ground"></div>
    </div>
  </div>
</div>

<script>
const THEMES = [
  {
    key: 'space',
    label: '🚀 Vesmírné násobení',
    title: '🚀 Doleť raketou k planetě! 🪐',
    bodyClass: 'theme-space',
    topIcon: '🪐',
    vehicle: '🚀',
    rampIcon: '🗼',
    mathMode: 'big',
    winBanner: '🌟 BINGO! 🌟',
    loseBanner: '💥 BUM! 💥',
    winMsg: t => 'Dolétl jsi k planetě! Skvělá práce! 🎉 Tvůj čas: ' + t,
    loseMsg: 'Raketa spadla na zem a vybuchla. Zkus to znovu! 🚀',
    confettiSet: ['🎉','⭐','🚀','🌟','🎊','💫','🪐','✨'],
    difficulties: [
      { name: '🎈 Balónek',          drop: 0.5 },
      { name: '🧑‍🚀 Kadet',      drop: 1.0 },
      { name: '🚀 Pilot',            drop: 1.5 },
      { name: '☄️ Velitel',          drop: 2.25 },
      { name: '👽 Hvězdný kapitán',  drop: 3.0 },
    ],
  },
  {
    key: 'coconut',
    label: '🥥 Kokosová násobilka',
    title: '🐒 Utíkej opičko pro kokos! 🥥',
    bodyClass: 'theme-coconut',
    topIcon: '🌴',
    vehicle: '🐒',
    rampIcon: '🐅',
    mathMode: 'small',
    winBanner: '🥥 HURÁ! 🥥',
    loseBanner: '😱 ÁÁÁ! 😱',
    winMsg: t => 'Opička vyšplhala na vrchol, utrhla kokos a hodila ho po tygrovi! 🎉 Tvůj čas: ' + t,
    loseMsg: 'Ouha, tygr sežral opičku! Zkus to znovu! 🐒',
    confettiSet: ['🥥','🌴','🐒','⭐','🎉','🍌','✨'],
    difficulties: [
      { name: '🐒 Nováček džungle', drop: 1.0 },
      { name: '🌴 Šplhoun',         drop: 2.0 },
      { name: '🥥 Sběrač kokosů',   drop: 3.0 },
      { name: '🐅 Krotitel tygrů',  drop: 4.5 },
      { name: '👑 Král džungle',    drop: 6.0 },
    ],
  },
];
let themeIndex = 0;
let currentTheme = THEMES[themeIndex];

let diffIndex = 2;        // výchozí: prostřední úroveň
let DROP_PER_SEC = THEMES[themeIndex].difficulties[diffIndex].drop;  // % dolů každou sekundu
const UP_CORRECT = 15;    // % nahoru za správně
const DOWN_WRONG = 10;    // % dolů za špatně
const START_POS = 12;     // startovní výška po odpálení

const gameTitleEl = document.getElementById('gameTitle');
const exampleEl = document.getElementById('example');
const answerEl  = document.getElementById('answer');
const timeEl    = document.getElementById('time');
const heightEl  = document.getElementById('height');
const msgEl     = document.getElementById('msg');
const startBtn  = document.getElementById('startBtn');
const launchpadEl = document.getElementById('launchpad');
const topIconEl = document.getElementById('topIcon');
const rocketEl  = document.getElementById('rocket');
const rampIconEl = document.getElementById('rampIcon');
const pctEl     = document.getElementById('pct');
const gameBtns  = document.getElementById('gameBtns');
const diffBtns  = document.getElementById('diffBtns');
const keypadEl  = document.getElementById('keypad');
const mobileToggleBtn = document.getElementById('mobileToggle');

let pos = 0;          // % výška 0..100
let elapsed = 0;      // celkový čas hry v desetinách sekundy
let curAnswer = 0;
let tickId = null;
let playing = false;

// ---- mobilní režim: dotyková klávesnice místo systémové ----
function detectMobile(){
  const ua = navigator.userAgent || '';
  const uaMobile = /Android|iPhone|iPad|iPod|IEMobile|Opera Mini|Mobile/i.test(ua);
  const coarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  return uaMobile || coarsePointer;
}
let mobileMode = detectMobile();

function applyMobileMode(){
  document.body.classList.toggle('mobile-ui', mobileMode);
  mobileToggleBtn.classList.toggle('on', mobileMode);
  mobileToggleBtn.textContent = mobileMode ? '🖥️' : '📱';
  answerEl.readOnly = mobileMode;
  answerEl.inputMode = mobileMode ? 'none' : 'numeric';
  if (mobileMode) answerEl.blur();
}
applyMobileMode();

mobileToggleBtn.addEventListener('click', () => {
  mobileMode = !mobileMode;
  applyMobileMode();
});

keypadEl.addEventListener('click', e => {
  const btn = e.target.closest('.key');
  if (!btn || !playing) return;
  const k = btn.dataset.key;
  if (k === 'back'){
    answerEl.value = answerEl.value.slice(0, -1);
  } else if (k === 'ok'){
    submit();
  } else if (answerEl.value.length < 4){
    answerEl.value += k;
  }
});

// ---- zvuky (syntetizované, bez souborů) ----
let audioCtx = null;
let heartbeatTimer = null;

function ensureAudio(){
  if (!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tone(freq, start, dur, type, gain, freqEnd){
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, start);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,1), start+dur);
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(Math.max(gain,0.0002), start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(start);
  osc.stop(start+dur+0.02);
}

function noiseBurst(start, dur, gain, filterStart, filterEnd, filterType){
  const n = Math.max(1, Math.floor(audioCtx.sampleRate*dur));
  const buffer = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0;i<n;i++) data[i] = Math.random()*2-1;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = filterType || 'lowpass';
  filter.frequency.setValueAtTime(filterStart, start);
  filter.frequency.exponentialRampToValueAtTime(Math.max(filterEnd,20), start+dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, start);
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
  src.connect(filter).connect(g).connect(audioCtx.destination);
  src.start(start);
  src.stop(start+dur+0.02);
}

function playHeartbeat(danger){
  const t = audioCtx.currentTime;
  const vol = 0.05 + danger*0.28;
  tone(58, t, 0.09, 'sine', vol);
  tone(46, t+0.13, 0.11, 'sine', vol*0.7);
}

function startHeartbeat(){
  stopHeartbeat();
  heartbeatTick();
}

function stopHeartbeat(){
  if (heartbeatTimer){ clearTimeout(heartbeatTimer); heartbeatTimer = null; }
}

function heartbeatTick(){
  if (!playing) return;
  const danger = 1 - Math.min(1, Math.max(0, pos/100));   // 0 = bezpečno, 1 = u tygra
  playHeartbeat(danger);
  const bpm = 55 + danger*130;
  heartbeatTimer = setTimeout(heartbeatTick, 60000/bpm);
}

function playThrowSound(){
  noiseBurst(audioCtx.currentTime, 0.32, 0.28, 3200, 500, 'bandpass');
}

function playTigerDeath(){
  const t = audioCtx.currentTime;
  tone(480, t, 0.5, 'sawtooth', 0.22, 110);
  noiseBurst(t, 0.3, 0.15, 900, 100, 'lowpass');
}

function playTigerAttack(){
  const t = audioCtx.currentTime;
  tone(130, t, 0.4, 'sawtooth', 0.32, 55);
  noiseBurst(t, 0.45, 0.35, 2200, 150, 'lowpass');
}

function playWinFanfare(){
  const t = audioCtx.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.5];   // C5 E5 G5 C6
  notes.forEach((f,i) => tone(f, t + i*0.12, 0.22, 'triangle', 0.22));
}

function playExplosion(){
  const t = audioCtx.currentTime;
  noiseBurst(t, 0.5, 0.35, 1600, 80, 'lowpass');
  tone(90, t, 0.35, 'sawtooth', 0.25, 35);
}

function playCorrect(){
  const t = audioCtx.currentTime;
  tone(659.25, t, 0.1, 'triangle', 0.22);
  tone(987.77, t+0.09, 0.14, 'triangle', 0.22);
}

function playWrong(){
  const t = audioCtx.currentTime;
  tone(220, t, 0.22, 'square', 0.18, 110);
}

function fmtTime(tenths){
  return (tenths / 10).toFixed(1).replace('.', ',') + ' s';
}

function rnd(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

function renderGameBtns(){
  gameBtns.innerHTML = '';
  THEMES.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'diffBtn' + (i===themeIndex ? ' sel' : '') + (playing ? ' locked' : '');
    b.textContent = t.label;
    b.disabled = playing;
    b.addEventListener('click', () => {
      if (playing) return;
      themeIndex = i;
      applyTheme();
    });
    gameBtns.appendChild(b);
  });
}

function renderDiff(){
  diffBtns.innerHTML = '';
  currentTheme.difficulties.forEach((d, i) => {
    const b = document.createElement('button');
    b.className = 'diffBtn' + (i===diffIndex ? ' sel' : '') + (playing ? ' locked' : '');
    b.textContent = d.name;
    b.disabled = playing;
    b.addEventListener('click', () => {
      if (playing) return;
      diffIndex = i;
      DROP_PER_SEC = d.drop;
      renderDiff();
    });
    diffBtns.appendChild(b);
  });
}

function applyTheme(){
  currentTheme = THEMES[themeIndex];
  document.body.classList.remove('theme-space', 'theme-coconut');
  document.body.classList.add(currentTheme.bodyClass);
  gameTitleEl.textContent = currentTheme.title;
  topIconEl.textContent = currentTheme.topIcon;
  rampIconEl.textContent = currentTheme.rampIcon;
  rocketEl.textContent = currentTheme.vehicle;
  rocketEl.style.visibility = '';
  DROP_PER_SEC = currentTheme.difficulties[diffIndex].drop;
  if (!playing) setPos(START_POS);
  renderGameBtns();
  renderDiff();
}
applyTheme();

function setPos(p){
  pos = Math.max(-1, Math.min(100, p));
  const shown = Math.max(0, Math.round(pos));
  rocketEl.style.bottom = Math.max(0, pos) + '%';
  heightEl.textContent = shown;
  pctEl.textContent = shown + '%';
}

let solvedExamples = new Set();  // klíče příkladů už správně zodpovězených v této hře
let curKey = '';

function newExample(){
  let x, y, key;
  let attempts = 0;
  do {
    if (currentTheme.mathMode === 'small'){
      x = rnd(2,9); y = rnd(2,9);
    } else {
      const a = rnd(2,9); const b = rnd(10,20);
      [x,y] = Math.random()<0.5 ? [a,b] : [b,a];
    }
    key = Math.min(x,y) + 'x' + Math.max(x,y);
    attempts++;
  } while (solvedExamples.has(key) && attempts < 300);
  if (solvedExamples.has(key)) solvedExamples.clear();  // všechny kombinace vyčerpány, začni znovu
  curKey = key;
  curAnswer = x*y;
  exampleEl.textContent = x + ' × ' + y;
  answerEl.value = '';
  if (!mobileMode) answerEl.focus();
}

function startGame(){
  ensureAudio();
  playing = true;
  document.body.classList.add('playing');
  elapsed = 0; timeEl.textContent = fmtTime(0);
  msgEl.textContent = '';
  startBtn.style.display = 'none';
  answerEl.disabled = false;
  rocketEl.style.visibility = '';
  rocketEl.textContent = currentTheme.vehicle;
  rampIconEl.textContent = currentTheme.rampIcon;
  renderGameBtns(); // zamknout přepínání hry
  renderDiff();     // zamknout přepínání obtížnosti
  setPos(START_POS);           // start z dráhy
  solvedExamples.clear();
  newExample();
  if (tickId) clearInterval(tickId);
  tickId = setInterval(tick, 100);   // 10× za sekundu
  if (currentTheme.key === 'coconut') startHeartbeat();
}

function tick(){
  if (!playing) return;
  // čas běží
  elapsed++;
  timeEl.textContent = fmtTime(elapsed);
  // vozidlo klesá plynule (DROP_PER_SEC % za sekundu)
  setPos(pos - DROP_PER_SEC / 10);
  checkEnd();
}

function submit(){
  if (!playing) return;
  const val = answerEl.value.trim();
  if (val === '') return;
  if (parseInt(val,10) === curAnswer){
    playCorrect();
    solvedExamples.add(curKey);
    setPos(pos + UP_CORRECT);
    flash('⬆️ +' + UP_CORRECT + '%', '#34d399');
    if (checkEnd()) return;
    newExample();
  } else {
    playWrong();
    setPos(pos - DOWN_WRONG);
    flash('💥 Špatně! -' + DOWN_WRONG + '%', '#ef4444');
    answerEl.classList.remove('shake'); void answerEl.offsetWidth;
    answerEl.classList.add('shake');
    if (mobileMode) answerEl.value = ''; else answerEl.select();
    checkEnd();   // příklad zůstává
  }
}

function flash(text, color){
  msgEl.textContent = text;
  msgEl.style.color = color;
}

function checkEnd(){
  if (pos >= 100){ win(); return true; }
  if (pos <= 0){ boom(); return true; }
  return false;
}

function stop(){
  playing = false;
  document.body.classList.remove('playing');
  clearInterval(tickId);
  stopHeartbeat();
  answerEl.disabled = true;
  startBtn.style.display = '';
  renderGameBtns(); // znovu povolit přepínání hry
  renderDiff();     // znovu povolit přepínání obtížnosti
}

function win(){
  stop();
  setPos(100);
  rocketEl.textContent = currentTheme.vehicle;
  exampleEl.textContent = currentTheme.winBanner;
  msgEl.style.color = '#34d399';
  msgEl.textContent = currentTheme.winMsg(fmtTime(elapsed));
  startBtn.textContent = '▶️ Hrát znovu';
  if (currentTheme.key === 'coconut'){
    throwCoconut();
  } else {
    playWinFanfare();
    celebrate();
  }
}

function throwCoconut(){
  playThrowSound();
  const coconut = document.createElement('div');
  coconut.id = 'flyingCoconut';
  coconut.textContent = '🥥';
  launchpadEl.appendChild(coconut);
  requestAnimationFrame(() => coconut.classList.add('fly'));
  setTimeout(() => {
    rampIconEl.textContent = '😵';
    coconut.remove();
    playTigerDeath();
    celebrate();
  }, 650);
}

function boom(){
  stop();
  if (currentTheme.key === 'coconut'){
    playTigerAttack();
    rocketEl.textContent = '😱';
    setTimeout(() => { rocketEl.style.visibility = 'hidden'; }, 300);
  } else {
    playExplosion();
    rocketEl.textContent = '💥';
  }
  exampleEl.textContent = currentTheme.loseBanner;
  msgEl.style.color = '#ef4444';
  msgEl.textContent = currentTheme.loseMsg;
  startBtn.textContent = '▶️ Zkusit znovu';
  setTimeout(()=>{
    rocketEl.textContent = currentTheme.vehicle;
    rocketEl.style.visibility = '';
    rampIconEl.textContent = currentTheme.rampIcon;
  }, 1500);
}

function celebrate(){
  const e = currentTheme.confettiSet;
  for (let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='confetti'; c.textContent=e[Math.floor(Math.random()*e.length)];
    c.style.left=Math.random()*100+'vw';
    c.style.animationDuration=(2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.6)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

answerEl.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
startBtn.addEventListener('click', startGame);

// ovládání klávesnicí před startem: šipky nahoru/dolů = hra, šipky vlevo/vpravo = obtížnost, Enter = start
document.addEventListener('keydown', e=>{
  if (playing) return;
  if (e.target === answerEl) return;  // Enter z políčka odpovědi neřešíme (ukončil hru)
  if (e.key === 'ArrowUp'){
    themeIndex = (themeIndex - 1 + THEMES.length) % THEMES.length;
    applyTheme();
    e.preventDefault();
  } else if (e.key === 'ArrowDown'){
    themeIndex = (themeIndex + 1) % THEMES.length;
    applyTheme();
    e.preventDefault();
  } else if (e.key === 'ArrowLeft'){
    diffIndex = (diffIndex - 1 + currentTheme.difficulties.length) % currentTheme.difficulties.length;
    DROP_PER_SEC = currentTheme.difficulties[diffIndex].drop;
    renderDiff();
    e.preventDefault();
  } else if (e.key === 'ArrowRight'){
    diffIndex = (diffIndex + 1) % currentTheme.difficulties.length;
    DROP_PER_SEC = currentTheme.difficulties[diffIndex].drop;
    renderDiff();
    e.preventDefault();
  } else if (e.key === 'Enter'){
    startGame();
    e.preventDefault();
  }
});
</script>
</body>
</html>
